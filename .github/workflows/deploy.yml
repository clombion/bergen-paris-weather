name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          submodules: true
          token: ${{ secrets.MARKDOC_TAGS_TOKEN }}

      - name: Merge weather snapshot from data branch
        run: |
          mkdir -p site/data
          if git fetch origin data --depth=1 2>/dev/null && \
             git show origin/data:site/data/now.json > site/data/now.json 2>/dev/null; then
            echo "merged now.json from data branch"
          else
            echo "data branch or now.json not found — bare legend will render"
            rm -f site/data/now.json
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
